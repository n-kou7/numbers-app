<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>かずともの</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #fff;
}

.container {
    padding: 10px;
}

.title {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
}

.input {
    display: flex;
    gap: 8px;
    margin: 10px 0;
}

.star {
    flex: 1;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 8px;
    font-size: 24px;
}

button {
    font-size: 18px;
    padding: 6px 10px;
}

.filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
}

.area {
    background: #fff6cc;
    height: 60vh;
    position: relative;
    border-radius: 10px;
    margin-top: 10px;
}

.item {
    position: absolute;
    width: 80px;
}

.summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 10px;
}

.summary img {
    width: 80px;
}

.big {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>
<div class="container">

<div class="title">かずと もの</div>

<div class="input">
<div id="star" class="star">すうじ</div>
<button onclick="showItems()">表示</button>
<button onclick="showSummary()">ごうけい</button>
</div>

<div class="filters">
<button onclick="setFilter('random')">ランダム</button>
<button onclick="setFilter('apple')">りんご</button>
<button onclick="setFilter('pencil')">えんぴつ</button>
<button onclick="setFilter('car')">くるま</button>
<button onclick="setFilter('plate')">おさら</button>
<button onclick="setFilter('dog')">いぬ</button>
</div>

<div id="area" class="area"></div>

</div>

<script>
let number = "";
let filter = "random";
let items = [];

const types = {
 apple:{img:"apple.png", counter:"こ"},
 pencil:{img:"pencil.png"},
 car:{img:"car.png", counter:"だい"},
 plate:{img:"plate.png", counter:"まい"},
 dog:{img:"dog.png"}
};

document.body.addEventListener("keydown", e=>{
    if(!isNaN(e.key)){
        number += e.key;
    }
    if(e.key==="Backspace"){
        number = number.slice(0,-1);
    }
    updateStar();
});

function updateStar(){
    document.getElementById("star").innerText =
        number ? "★".repeat(number.length) : "すうじ";
}

function setFilter(f){
    filter=f;
}

function showItems(){
    const area = document.getElementById("area");
    area.innerHTML="";
    items=[];

    const n = parseInt(number);
    if(!n) return;

    for(let i=0;i<n;i++){
        let type = filter==="random"
            ? Object.keys(types)[Math.floor(Math.random()*5)]
            : filter;

        const img = document.createElement("img");
        img.src = types[type].img;
        img.className="item";

        img.style.left = Math.random()*90+"%";
        img.style.top = Math.random()*80+"%";

        img.onclick=()=>showBig(type);

        area.appendChild(img);
        items.push(type);
    }
}

function showBig(type){
    const div=document.createElement("div");
    div.className="big";

    div.innerHTML = `
        <img src="${types[type].img}" width="200">
        <div style="font-size:80px;">1${getReading(1,type)}</div>
    `;

    div.onclick=()=>div.remove();
    document.body.appendChild(div);
}

function showSummary(){
    const area=document.getElementById("area");
    const count={};

    items.forEach(t=>count[t]=(count[t]||0)+1);

    area.innerHTML="<div class='summary'></div>";
    const s=area.firstChild;

    for(let t in count){
        const c=count[t];
        s.innerHTML+=`
        <div>
            <img src="${types[t].img}">
            <div style="font-size:40px;">
                ${c}${getReading(c,t)}
            </div>
        </div>`;
    }
}

function getReading(n,t){
    if(t==="pencil"){
        if(n==1||n==6||n==8||n==10) return "ぽん";
        if(n==3) return "ぼん";
        return "ほん";
    }
    if(t==="dog"){
        if(n==1||n==6||n==8||n==10) return "ぴき";
        if(n==3) return "びき";
        return "ひき";
    }
    return types[t].counter;
}
</script>

</body>
</html>
